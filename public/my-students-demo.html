<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Students</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4f;
      --text: #e6edf3;
      --muted: #8b9cad;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --danger: #f87171;
    }
    * { box-sizing: border-box; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      line-height: 1.5;
      min-height: 100vh;
    }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }
    h1 { font-size: 1.35rem; font-weight: 600; margin: 0 0 0.25rem; }
    .sub { color: var(--muted); font-size: 0.9rem; margin: 0 0 1.25rem; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
    }
    .stats { display:grid; gap:0.75rem; margin-bottom: 1rem; }
    @media (min-width: 760px) { .stats { grid-template-columns: repeat(3, 1fr); } }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.8rem 1rem;
    }
    .stat-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .stat-value { font-size: 1.25rem; font-weight: 700; margin-top: 0.2rem; }
    label { display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); margin-bottom: 0.35rem; }
    input, select {
      width: 100%;
      padding: 0.55rem 0.75rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 0.95rem;
    }
    input:focus, select:focus { outline: 2px solid var(--accent); border-color: transparent; }
    .row { display: grid; gap: 1rem; }
    @media (min-width: 760px) { .row.cols-4 { grid-template-columns: 1.4fr 1fr auto; } }
    button {
      padding: 0.6rem 1.1rem;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
      white-space: nowrap;
    }
    button:hover { background: var(--accent-hover); }
    button.secondary { background: var(--border); color: var(--text); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .actions { display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: end; }
    .err { color: var(--danger); font-size: 0.9rem; white-space: pre-wrap; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th, td { text-align: left; padding: 0.65rem 0.5rem; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 600; }
    tr:hover { background: rgba(255,255,255,0.03); }
    .muted { color: var(--muted); }
    .pill { display:inline-block; padding:0.15rem 0.5rem; border:1px solid var(--border); border-radius: 999px; font-size:0.75rem; color: var(--muted); }
    .topbar { display:flex; gap:0.75rem; justify-content: space-between; align-items: center; flex-wrap: wrap; }
    .pager { display:flex; gap:0.5rem; align-items:center; }
    .link { color: var(--accent); text-decoration: none; }
    .link:hover { text-decoration: underline; }
    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      object-fit: cover;
      border: 1px solid var(--border);
      background: var(--bg);
      margin-right: 0.5rem;
    }
    .student-cell { display:flex; align-items: center; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1>My Students</h1>
        <p class="sub">Student list for Task 1 (from MySQL <code>classes</code> + <code>users</code>). No teacher ID needed.</p>
      </div>
      <div class="muted" style="font-size:0.9rem; display:flex; gap:0.7rem; align-items:center; flex-wrap:wrap;">
        <a class="link" href="/demo-home.html">Home</a>
        <a class="link" href="/pre-session-brief-demo.html">Task 2 Brief</a>
      </div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">Total Students</div>
        <div id="statTotal" class="stat-value">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">Active Students</div>
        <div id="statActive" class="stat-value">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">Page</div>
        <div id="statPage" class="stat-value">—</div>
      </div>
    </div>

    <div class="card">
      <div class="row cols-4">
        <div>
          <label for="search">Search</label>
          <input id="search" type="text" placeholder="name / email" autocomplete="off" />
        </div>
        <div>
          <label for="sortBy">Sort by</label>
          <select id="sortBy">
            <option value="name">Name</option>
            <option value="level">Level</option>
            <option value="totalClasses">Total Classes</option>
            <option value="learningHours">Learning Hours</option>
            <option value="lastClass">Last Class</option>
          </select>
        </div>
        <div class="actions">
          <button type="button" id="loadBtn">Load</button>
          <button type="button" id="clearSearchBtn" class="secondary">Clear</button>
          <button type="button" id="firstBtn" class="secondary">First</button>
          <button type="button" id="prevBtn" class="secondary">Prev</button>
          <button type="button" id="nextBtn" class="secondary">Next</button>
          <button type="button" id="lastBtn" class="secondary">Last</button>
        </div>
        <div class="actions">
          <label for="pageInput" style="margin-bottom:0;">Go to page</label>
          <input id="pageInput" type="number" min="1" placeholder="Page" style="max-width:110px;" />
          <button type="button" id="goPageBtn" class="secondary">Go</button>
        </div>
      </div>
      <p id="statusText" class="sub" style="margin: 1rem 0 0;"></p>
      <p id="errorText" class="err" style="display:none;"></p>
    </div>

    <div class="card">
      <div style="overflow:auto;">
        <table>
          <thead>
            <tr>
              <th style="min-width: 220px;">Student</th>
              <th>Level</th>
              <th>Total Classes</th>
              <th>Learning Hours</th>
              <th>Last Class</th>
              <th style="min-width: 160px;">Action</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="6" class="muted">Loading students…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    let page = 1;
    const limit = 10;
    let lastKnownTotalPages = 1;

    function showErr(msg) {
      const el = $('errorText');
      if (msg) { el.textContent = msg; el.style.display = 'block'; }
      else { el.textContent = ''; el.style.display = 'none'; }
    }

    function qs() {
      const p = new URLSearchParams(window.location.search);
      return {
        search: p.get('search') || '',
        sortBy: p.get('sortBy') || 'name',
        sortOrder: p.get('sortOrder') || 'desc',
        page: Number(p.get('page') || '1') || 1,
      };
    }

    function setQs(next) {
      const p = new URLSearchParams(window.location.search);
      for (const [k, v] of Object.entries(next)) {
        if (v == null || v === '') p.delete(k);
        else p.set(k, String(v));
      }
      const s = p.toString();
      history.replaceState(null, '', s ? ('?' + s) : '');
    }

    function renderRows(data) {
      const students = Array.isArray(data.students) ? data.students : [];
      const tb = $('tbody');
      if (students.length === 0) {
        tb.innerHTML = '<tr><td colspan="6" class="muted">No students found.</td></tr>';
        return;
      }
      tb.innerHTML = students.map((s) => {
        const safeId = s.id != null ? String(s.id) : '—';
        const name = esc((s.name && String(s.name).trim()) || `Student ${safeId}`);
        const level = esc(s.level || '—');
        const total = esc(String(s.totalClasses ?? 0));
        const hours = esc(String(s.learningHours?.total ?? 0));
        const last = s.lastClassDays != null
          ? (Number(s.lastClassDays) === 0 ? 'Today' : `${esc(String(s.lastClassDays))} days ago`)
          : 'No classes yet';
        const link = '/student-profile-demo.html?studentId=' + encodeURIComponent(safeId);
        const avatar = s.avatar ? '<img class="avatar" src="' + esc(s.avatar) + '" alt="' + name + '">' : '<div class="avatar"></div>';
        return (
          '<tr>' +
            '<td><div class="student-cell">' + avatar + '<div><div style="font-weight:600;">' + name + '</div><div class="muted" style="font-size:0.85rem;">ID ' + esc(safeId) + '</div></div></div></td>' +
            '<td>' + level + '</td>' +
            '<td>' + total + '</td>' +
            '<td>' + hours + '</td>' +
            '<td>' + esc(last) + '</td>' +
            '<td><a class="link" href="' + link + '">View snapshot</a></td>' +
          '</tr>'
        );
      }).join('');
    }

    function esc(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\"/g, '&quot;');
    }

    async function load(opts = {}) {
      showErr('');

      const search = $('search').value.trim();
      const sortBy = $('sortBy').value;
      const sortOrder = 'desc';

      if (/^\d+$/.test(search)) {
        $('tbody').innerHTML = '<tr><td colspan="6" class="muted">No students found.</td></tr>';
        $('statusText').textContent = '';
        $('statTotal').textContent = '—';
        $('statActive').textContent = '—';
        $('statPage').textContent = '—';
        showErr('Please search by student name or email, not numeric ID.');
        $('prevBtn').disabled = true;
        $('nextBtn').disabled = true;
        $('firstBtn').disabled = true;
        $('lastBtn').disabled = true;
        return;
      }

      $('loadBtn').disabled = $('prevBtn').disabled = $('nextBtn').disabled = true;
      $('firstBtn').disabled = true;
      $('lastBtn').disabled = true;
      $('goPageBtn').disabled = true;
      $('statusText').textContent = 'Loading…';
      try {
        const p = new URLSearchParams();
        p.set('page', String(page));
        p.set('limit', String(limit));
        if (search) p.set('search', search);
        if (sortBy) p.set('sortBy', sortBy);
        p.set('sortOrder', sortOrder);

        setQs({ search, sortBy, sortOrder, page });

        const res = await fetch('/demo/my-students?' + p.toString(), {
          headers: { Accept: 'application/json' },
        });
        const text = await res.text();
        let data;
        try { data = JSON.parse(text); } catch (_) { data = { error: text }; }
        if (!res.ok) {
          showErr('Unable to load the student list right now. Please try again.');
          $('statusText').textContent = '';
          return;
        }

        renderRows(data);
        const pg = data.pagination || {};
        const metrics = data.metrics || {};
        const totalStudents = Number(pg.totalStudents || 0);
        lastKnownTotalPages = Number(pg.totalPages || 1);
        $('statusText').textContent = totalStudents > 0
          ? ('Page ' + (pg.currentPage || page) + ' of ' + (pg.totalPages || 1) + ' · Total students: ' + totalStudents)
          : '';
        $('statTotal').textContent = String(pg.totalStudents ?? metrics.totalStudents ?? '—');
        $('statActive').textContent = String(metrics.activeStudents ?? '—');
        $('statPage').textContent = totalStudents > 0 ? String((pg.currentPage || page) + ' / ' + (pg.totalPages || 1)) : '—';

        const totalPages = Number(pg.totalPages || 1);
        $('prevBtn').disabled = page <= 1;
        $('nextBtn').disabled = page >= totalPages;
        $('firstBtn').disabled = page <= 1;
        $('lastBtn').disabled = page >= totalPages;
        $('goPageBtn').disabled = totalPages <= 1;
        $('pageInput').value = String(pg.currentPage || page);
      } catch (e) {
        showErr('Unable to load the student list right now. Please try again.');
        $('statusText').textContent = '';
      } finally {
        $('loadBtn').disabled = false;
        $('clearSearchBtn').disabled = false;
        if ($('goPageBtn').disabled && lastKnownTotalPages > 1) $('goPageBtn').disabled = false;
      }
    }

    $('loadBtn').addEventListener('click', () => { page = 1; load({ allowBlank: true }); });
    $('clearSearchBtn').addEventListener('click', () => {
      $('search').value = '';
      showErr('');
      page = 1;
      load({ allowBlank: true });
    });
    $('firstBtn').addEventListener('click', () => { page = 1; load({ allowBlank: true }); });
    $('prevBtn').addEventListener('click', () => { if (page > 1) { page -= 1; load({ allowBlank: true }); } });
    $('nextBtn').addEventListener('click', () => { page += 1; load({ allowBlank: true }); });
    $('lastBtn').addEventListener('click', () => { page = lastKnownTotalPages; load({ allowBlank: true }); });
    $('goPageBtn').addEventListener('click', () => {
      const nextPage = Number($('pageInput').value);
      if (!Number.isFinite(nextPage) || nextPage < 1) {
        showErr('Please enter a valid page number.');
        return;
      }
      page = Math.min(Math.max(1, Math.floor(nextPage)), lastKnownTotalPages || 1);
      load({ allowBlank: true });
    });

    // Init from query string for shareable demo links.
    (function init() {
      const init = qs();
      if (init.search) $('search').value = init.search;
      if (init.sortBy) $('sortBy').value = init.sortBy;
      if (init.page) page = init.page;
      if (window.location.protocol === 'file:') {
        showErr('Open this page via the running server, not as a local file.\nUse: http://localhost:3840/');
        $('statusText').textContent = '';
        return;
      }
      load({ allowBlank: true });
    })();
  </script>
</body>
</html>
