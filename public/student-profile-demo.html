<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Student Snapshot</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4f;
      --text: #e6edf3;
      --muted: #8b9cad;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --danger: #f87171;
    }
    * { box-sizing: border-box; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      line-height: 1.5;
      min-height: 100vh;
    }
    .wrap { max-width: 900px; margin: 0 auto; padding: 1.5rem; }
    h1 { font-size: 1.35rem; font-weight: 600; margin: 0 0 0.5rem; }
    .sub { color: var(--muted); font-size: 0.9rem; margin: 0 0 1.25rem; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
    }
    label { display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); margin-bottom: 0.35rem; }
    input {
      width: 100%;
      padding: 0.55rem 0.75rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 0.95rem;
    }
    input:focus { outline: 2px solid var(--accent); border-color: transparent; }
    .row { display: grid; gap: 1rem; margin-bottom: 1rem; }
    @media (min-width: 560px) { .row { grid-template-columns: 1fr 1fr; } }
    .actions { display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; margin-top: 1rem; }
    button {
      padding: 0.6rem 1.1rem;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
    }
    button:hover { background: var(--accent-hover); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.secondary { background: var(--border); color: var(--text); }
    .err { color: var(--danger); font-size: 0.9rem; white-space: pre-wrap; }
    .grid { display: grid; gap: 0.75rem; }
    @media (min-width: 560px) { .grid.cols-2 { grid-template-columns: 1fr 1fr; } }
    .metric { padding: 0.75rem; background: var(--bg); border-radius: 8px; border: 1px solid var(--border); }
    .metric k { display: block; font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.03em; }
    .metric v { font-size: 1rem; margin-top: 0.25rem; word-break: break-word; }
    .summary { font-size: 1rem; line-height: 1.6; }
    .note {
      margin-top: 0.75rem;
      padding: 0.75rem 0.9rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(59, 130, 246, 0.08);
      color: var(--muted);
      font-size: 0.88rem;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th, td { text-align: left; padding: 0.5rem 0.4rem; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 500; }
    pre { margin: 0; font-size: 0.75rem; overflow: auto; max-height: 320px; background: var(--bg); padding: 0.75rem; border-radius: 6px; border: 1px solid var(--border); }
    .badge { display: inline-block; font-size: 0.7rem; padding: 0.2rem 0.45rem; border-radius: 999px; border: 1px solid var(--border); color: var(--muted); }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="wrap">
    <div style="display:flex; justify-content: space-between; gap: 1rem; flex-wrap: wrap; align-items: baseline;">
      <div>
        <h1>Student Profile Snapshot</h1>
        <p class="sub">Loads Task 1 snapshot data and shows `summaryDisplay` exactly as the personalized UI would render it.</p>
      </div>
      <div class="sub" style="margin:0;">
        <a href="/demo-home.html">Home</a>
        <span style="margin:0 0.45rem;">·</span>
        <a href="/pre-session-brief-demo.html">Task 2 Brief</a>
        <span style="margin:0 0.45rem;">·</span>
        <a id="backLink" href="/my-students-demo.html">← Back to student list</a>
      </div>
    </div>

    <div class="card">
      <div class="row">
        <div>
          <label for="studentId">Student ID</label>
          <input id="studentId" type="text" placeholder="e.g. 123" autocomplete="off" />
        </div>
      </div>
      <div class="actions">
        <button type="button" id="loadBtn">Load snapshot</button>
        <button type="button" id="refreshBtn" class="secondary">Refresh (sync)</button>
      </div>
      <p id="statusText" class="sub" style="margin: 1rem 0 0;"></p>
      <p id="errorText" class="err" style="display:none;"></p>
    </div>

    <div id="result" style="display:none;">
      <div class="card">
        <h2 style="font-size:1rem; margin:0 0 0.75rem;">Summary for UI (`summaryDisplay`)</h2>
        <p id="summaryDisplay" class="summary"></p>
        <div id="analysisNote" class="note" style="display:none;"></div>
      </div>
      <div class="card">
        <h2 style="font-size:1rem; margin:0 0 0.75rem;">Key metrics</h2>
        <div class="grid cols-2" id="metricsGrid"></div>
      </div>
      <div class="card">
        <h2 style="font-size:1rem; margin:0 0 0.75rem;">Weak words</h2>
        <div id="weakTable"></div>
      </div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    function toTitleCase(value) {
      return String(value || '')
        .toLowerCase()
        .replace(/(^|\s)\S/g, (m) => m.toUpperCase());
    }

    function labelize(key) {
      const map = {
        metricsStatus: 'Metrics Status',
        summaryStatus: 'Summary Status',
        englishLevel: 'English Level',
        totalWordsLearned: 'Total Words Learned',
        totalClasses: 'Total Classes',
        learningGoal: 'Learning Goal',
        grammarTopics: 'Grammar Topics',
        lastAnalysisAt: 'Last Analysis At',
        metricsUpdatedAt: 'Metrics Updated At',
        summaryUpdatedAt: 'Summary Updated At',
      };
      return map[key] || key;
    }

    function formatMetricValue(key, value) {
      if (value == null || value === '') return '—';
      if (key === 'metricsStatus' || key === 'summaryStatus') return toTitleCase(value);
      return String(value);
    }

    function headers() {
      return { Accept: 'application/json' };
    }

    function showErr(msg) {
      const el = $('errorText');
      if (msg) { el.textContent = msg; el.style.display = 'block'; }
      else { el.textContent = ''; el.style.display = 'none'; }
    }

    function esc(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\"/g, '&quot;');
    }

    function render(data) {
      $('result').style.display = 'block';
      $('summaryDisplay').textContent = data.summaryDisplay || data.aiSummary || '—';

      const showAnalysisNote =
        Number(data.totalClasses || 0) > 0 &&
        !data.lastAnalysisAt &&
        (!Array.isArray(data.grammarTopics) || data.grammarTopics.length === 0) &&
        !data.englishLevel;
      $('analysisNote').style.display = showAnalysisNote ? 'block' : 'none';
      $('analysisNote').textContent = showAnalysisNote
        ? 'Ended classes were found, but some older classes happened before AI analysis was available, so an analysis may not exist for them.'
        : '';

      const metrics = [
        ['metricsStatus', data.metricsStatus],
        ['summaryStatus', data.summaryStatus],
        ['englishLevel', data.englishLevel],
        ['totalWordsLearned', data.totalWordsLearned],
        ['totalClasses', data.totalClasses],
        ['learningGoal', data.learningGoal],
        ['grammarTopics', Array.isArray(data.grammarTopics) ? data.grammarTopics.join(', ') : data.grammarTopics],
        ['lastAnalysisAt', data.lastAnalysisAt],
        ['metricsUpdatedAt', data.metricsUpdatedAt],
        ['summaryUpdatedAt', data.summaryUpdatedAt],
      ];
      $('metricsGrid').innerHTML = metrics.map(([k, v]) =>
        '<div class="metric"><k>' + esc(labelize(k)) + '</k><v>' + esc(formatMetricValue(k, v)) + '</v></div>'
      ).join('');

      const weak = Array.isArray(data.weakWords) ? data.weakWords : [];
      if (weak.length === 0) {
        $('weakTable').innerHTML = '<p class="sub" style="margin:0;">None in snapshot.</p>';
      } else {
        $('weakTable').innerHTML =
          '<table><thead><tr><th>Word</th><th>Count</th><th>Issue</th></tr></thead><tbody>' +
          weak.map((w) =>
            '<tr><td>' + esc(w.word ?? '') + '</td><td>' + esc(w.count ?? '') + '</td><td>' + esc(w.issue ?? '—') + '</td></tr>'
          ).join('') +
          '</tbody></table>';
      }
    }

    async function pollForFreshSnapshot(studentId) {
      for (let i = 0; i < 20; i += 1) {
        await new Promise((resolve) => setTimeout(resolve, 1500));
        try {
          const res = await fetch('/v1/teachers/students/' + encodeURIComponent(studentId) + '/profile', {
            method: 'GET',
            headers: headers(),
            cache: 'no-store',
          });
          if (!res.ok) return;
          const data = await res.json();
          render(data);
          $('statusText').textContent = 'Snapshot updated';
          if (
            data.metricsStatus !== 'pending' &&
            data.metricsStatus !== 'generating' &&
            data.summaryStatus !== 'pending' &&
            data.summaryStatus !== 'generating'
          ) {
            return;
          }
        } catch (_) {
          return;
        }
      }
    }

    async function loadProfile(refresh) {
      const sid = $('studentId').value.trim();
      if (!sid) {
        showErr('Please enter a student ID.');
        $('statusText').textContent = '';
        $('loadBtn').disabled = false;
        $('refreshBtn').disabled = false;
        return;
      }
      if (!/^\d+$/.test(sid)) {
        showErr('Please enter a valid numeric student ID.');
        $('statusText').textContent = '';
        $('loadBtn').disabled = false;
        $('refreshBtn').disabled = false;
        return;
      }
      showErr('');
      $('loadBtn').disabled = $('refreshBtn').disabled = true;
      $('statusText').textContent = refresh ? 'Refreshing…' : 'Loading…';
      try {
        const url = refresh
          ? '/v1/teachers/students/' + encodeURIComponent(sid) + '/profile/refresh'
          : '/v1/teachers/students/' + encodeURIComponent(sid) + '/profile';
        const res = await fetch(url, {
          method: refresh ? 'POST' : 'GET',
          cache: 'no-store',
          headers: { ...headers(), ...(refresh ? { 'Content-Type': 'application/json' } : {}) },
          body: refresh ? '{}' : undefined,
        });
        const text = await res.text();
        let data;
        try { data = JSON.parse(text); } catch (_) { data = { error: text }; }
        if (!res.ok) {
          if (res.status === 400) showErr('Please enter a valid numeric student ID.');
          else if (res.status === 404) showErr('No snapshot was found for this student.');
          else showErr('Unable to load the student snapshot right now. Please try again.');
          $('statusText').textContent = '';
          $('result').style.display = 'none';
          return;
        }
        render(data);
        $('statusText').textContent = refresh ? 'Snapshot refreshed' : 'Snapshot loaded';
        if (
          !refresh &&
          (
            data.metricsStatus === 'pending' ||
            data.metricsStatus === 'generating' ||
            data.summaryStatus === 'pending' ||
            data.summaryStatus === 'generating'
          )
        ) {
          pollForFreshSnapshot(sid);
        }
      } catch (e) {
        showErr('Unable to load the student snapshot right now. Please try again.');
        $('statusText').textContent = '';
        $('result').style.display = 'none';
      } finally {
        $('loadBtn').disabled = $('refreshBtn').disabled = false;
      }
    }

    function initFromQuery() {
      if (window.location.protocol === 'file:') {
        showErr('Open this page via the running server, not as a local file.\\nUse: http://localhost:3840/');
        $('statusText').textContent = '';
        return;
      }
      const p = new URLSearchParams(window.location.search);
      const sid = p.get('studentId');
      if (sid) $('studentId').value = sid;
      if (sid) loadProfile(false);
    }

    $('loadBtn').addEventListener('click', () => loadProfile(false));
    $('refreshBtn').addEventListener('click', () => loadProfile(true));
    initFromQuery();
  </script>
</body>
</html>
